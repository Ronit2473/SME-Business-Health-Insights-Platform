<!DOCTYPE html>
<html>
<head>
    <title>Retail AI Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    

<div class="container">
    <h1>🔥 <p style="text-align:center; color:#94a3b8;">
        AI-powered retail insights & predictions
    </p></h1>

    <a href="/analysis">
        <button>Go to Analysis</button>
    </a>
    <button class="btn" onclick="window.location.href='/walmart-insights'">
        📊 View Walmart Insights
    </button>

    <div id="kpis" class="grid"></div>

    <canvas id="trendChart"></canvas>

    <h2>🚨 Recommendations</h2>
    <div id="recommendations"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/script.js"></script>

<div class="chat-container">
    <div id="chat-box"></div>
    
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask about your data...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

</body>
</html>
